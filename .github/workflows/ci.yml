name: CI

on:
  push:
    branches: [main]
  pull_request:

# Deny-all at the workflow level; grant the minimum per job.
permissions: {}

# Deterministic, network-light runs: no telemetry calls or update nags that can
# add latency/flake when many runs execute in parallel.
env:
  TURBO_TELEMETRY_DISABLED: '1'
  DO_NOT_TRACK: '1'

concurrency:
  # One in-flight run per PR / branch. PRs key on refs/pull/<n>/merge and pushes on
  # refs/heads/<branch>, so concurrent PRs NEVER cancel each other — only a newer
  # push to the SAME ref supersedes an older, still-running one. This isolates the
  # parallel work of multiple agents/branches.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Unit + integration on a hermetic, ephemeral runner (its own FS/ports/containers),
  # so parallel runs cannot collide. E2E is intentionally NOT run here: the Playwright
  # suites are serial and target the SHARED DinD host, so running them in this pipeline
  # would race across concurrent PRs. E2E runs locally on an isolated per-agent slot —
  # see scripts/e2e-deploy.sh and CONTRIBUTING.md.
  verify:
    name: Verify · lint · typecheck · test · build
    runs-on: ubuntu-latest
    # Cap a hung run so it can't hold a shared runner slot away from parallel work.
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      # Third-party actions are pinned to commit SHAs (supply-chain hardening).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        # Reads the pnpm version from package.json "packageManager".
        uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Fails the build on high/critical advisories. Moderate dev-tooling
      # advisories (e.g. vitest's transitive vite/esbuild dev-server issues) are
      # not exploitable in CI/build and are tracked for the next vitest upgrade.
      # Explicit exemptions live in root package.json pnpm.auditConfig.ignoreGhsas:
      # - GHSA-gv7w-rqvm-qjhr (esbuild <0.28.1): the flaw is in esbuild's DENO
      #   installer (no binary integrity check via NPM_CONFIG_REGISTRY) — no Deno
      #   in this stack, build-time only, registry lockfile-pinned. Vite pins
      #   esbuild 0.25 and 0.28 drops transpile support for our editor browser
      #   targets, so a blanket override is NOT viable; re-check on vite bumps.
      #   (Our own gen-vendor esbuild is already >=0.28.1.)
      - name: Audit dependencies
        run: pnpm audit --audit-level high

      # Guard against hand-edits / upstream drift of the generated brand-icons set.
      - name: Check generated brand icons are up to date
        run: pnpm --filter @sitewright/blocks gen:brand-icons:check

      # Same guard for the generated country-flag set (flag-icons + circle-flags).
      - name: Check generated flag icons are up to date
        run: pnpm --filter @sitewright/blocks gen:flag-icons:check

      # Same guard for the vendored component runtimes (Embla carousel / GLightbox bundles).
      - name: Check generated vendor component runtimes are up to date
        run: pnpm --filter @sitewright/blocks gen:vendor:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Build before test: some integration tests assert on built output.
      - name: Build
        run: pnpm build

      - name: Test (with coverage gate)
        run: pnpm test
