name: CI

on:
  push:
    branches: [main]
  pull_request:

# Deny-all at the workflow level; grant the minimum per job.
permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify · lint · typecheck · test · build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Third-party actions are pinned to commit SHAs (supply-chain hardening).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        # Reads the pnpm version from package.json "packageManager".
        uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Fails the build on high/critical advisories. Moderate dev-tooling
      # advisories (e.g. vitest's transitive vite/esbuild dev-server issues) are
      # not exploitable in CI/build and are tracked for the next vitest upgrade.
      - name: Audit dependencies
        run: pnpm audit --audit-level high

      # Guard against hand-edits / upstream drift of the generated brand-icons set.
      - name: Check generated brand icons are up to date
        run: pnpm --filter @sitewright/blocks gen:brand-icons:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Build before test: the render-app integration test asserts on built output.
      - name: Build
        run: pnpm build

      - name: Test (with coverage gate)
        run: pnpm test
