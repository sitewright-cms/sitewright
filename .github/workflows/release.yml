name: Release

# Cut a release by pushing a semver tag, e.g. `git tag v0.2.0 && git push origin v0.2.0` (see RELEASING.md).
# Builds the runtime image, publishes it to GHCR (versioned + `:latest` for stable), smokes it, and creates
# a GitHub Release with auto-generated notes. Pre-release tags (v1.2.3-rc1) skip `:latest` + are marked pre-release.
on:
  push:
    tags: ['v*.*.*']

# Deny-all at the workflow level; grant the minimum per job.
permissions: {}

env:
  TURBO_TELEMETRY_DISABLED: '1'
  DO_NOT_TRACK: '1'

concurrency:
  # One run per tag; never cancel an in-flight release (each tag is distinct, and a half-pushed image is worse).
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build image · publish to GHCR · GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write # create the GitHub Release
      packages: write # push the image to GHCR
    steps:
      # Third-party actions pinned to commit SHAs (supply-chain hardening) — same pins as ci.yml.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0c17529a66aca453f9227af23103ed11469b1e47 # v4.0.0

      - name: Setup Node
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The tag drives everything: `v1.2.3` -> version `1.2.3` (baked into the image, reported at /version).
      - name: Resolve version + image
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}" # GHCR requires a lowercase path
          prerelease=false
          [[ "$version" == *-* ]] && prerelease=true
          {
            echo "version=$version"
            echo "image=$image"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"
          echo "Releasing $image:$version (prerelease=$prerelease)"

      - name: Build
        run: pnpm build

      # Assemble the runtime context: a self-contained `pnpm deploy` output + the built editor SPA.
      - name: Assemble deploy output
        run: |
          pnpm --filter @sitewright/api deploy --prod /tmp/deploy
          rm -rf /tmp/deploy/editor
          cp -r apps/editor/dist /tmp/deploy/editor

      # Build ONLY (no push yet — see the smoke gate below). SECURITY: tag-derived values are passed via
      # `env:` and referenced as shell vars, NEVER spliced into the script as `${{ }}` — a tag name is
      # attacker-controllable (anyone with write access), and `${{ }}` in a `run:` body is executed as code.
      - name: Build image
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          IMAGE: ${{ steps.meta.outputs.image }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
          REVISION: ${{ github.sha }}
        run: |
          tags=(-t "$IMAGE:$VERSION")
          [[ "$PRERELEASE" == "false" ]] && tags+=(-t "$IMAGE:latest")
          docker build \
            --build-arg SW_VERSION="$VERSION" \
            --label "org.opencontainers.image.source=$SOURCE_URL" \
            --label "org.opencontainers.image.revision=$REVISION" \
            --label "org.opencontainers.image.version=$VERSION" \
            "${tags[@]}" \
            -f apps/api/Dockerfile /tmp/deploy

      # Smoke the freshly-built image BEFORE publishing: prove the slimmed Chromium still renders
      # (Latin+CJK+emoji). A failure here aborts the release with NOTHING pushed to GHCR.
      - name: Smoke the image (render inside it)
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          IMAGE: ${{ steps.meta.outputs.image }}
        run: |
          docker run --rm --workdir /app -v "$PWD/apps/api/scripts:/smoke:ro" \
            --entrypoint node "$IMAGE:$VERSION" /smoke/snapshot-smoke.mjs

      # Only reached if the smoke passed — now publish.
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          IMAGE: ${{ steps.meta.outputs.image }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          docker push "$IMAGE:$VERSION"
          if [[ "$PRERELEASE" == "false" ]]; then
            docker push "$IMAGE:latest"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
        run: |
          flags=(--generate-notes --title "$GITHUB_REF_NAME")
          [[ "$PRERELEASE" == "true" ]] && flags+=(--prerelease)
          gh release create "$GITHUB_REF_NAME" "${flags[@]}"
