<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:transparent}
  .lock{display:inline-flex;align-items:center;gap:14px;padding:10px}
  .wm{font-family:'Space Grotesk',system-ui,sans-serif;font-weight:700;font-size:40px;letter-spacing:-.02em;line-height:1}
  #lock-light .wm{color:#0F172A}
  #lock-dark .wm{color:#FFFFFF}
  .fav{display:grid;place-items:center;line-height:0}
  .fav svg{width:100%;height:100%;display:block}
  .row{display:flex;gap:24px;align-items:flex-end;padding:20px}
  /* exact-size favicon stages */
  #fav-180{width:180px;height:180px}
  #fav-32{width:32px;height:32px}
  #fav-16{width:16px;height:16px}
</style>
</head>
<body>
  <!-- ===== Lockups (rendered with Space Grotesk baked in) ===== -->
  <div id="lock-light" class="lock">
    <svg width="44" height="44" viewBox="0 0 96 96" fill="none"><path d="M30 18 V72 H78" stroke="#0F172A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><rect x="40" y="52" width="26" height="14" rx="3" fill="#14B8A6"/><rect x="40" y="35" width="26" height="14" rx="3" fill="#4F2DD8"/></svg>
    <span class="wm">Sitewright</span>
  </div>
  <div id="lock-dark" class="lock">
    <svg width="44" height="44" viewBox="0 0 96 96" fill="none"><path d="M30 18 V72 H78" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/><rect x="40" y="52" width="26" height="14" rx="3" fill="#2DD4BF"/><rect x="40" y="35" width="26" height="14" rx="3" fill="#6D5BF5"/></svg>
    <span class="wm">Sitewright</span>
  </div>

  <!-- ===== Favicon / app-icon raster stages (indigo tile) ===== -->
  <div class="row">
    <div id="fav-180" class="fav"><svg viewBox="0 0 96 96" fill="none"><rect width="96" height="96" rx="20" fill="#4F2DD8"/><path d="M30 20 V72 H76" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><rect x="40" y="52" width="26" height="14" rx="3" fill="#2DD4BF"/><rect x="40" y="34" width="26" height="14" rx="3" fill="#FFFFFF"/></svg></div>
    <div id="fav-32" class="fav"><svg viewBox="0 0 96 96" fill="none"><rect width="96" height="96" rx="20" fill="#4F2DD8"/><path d="M30 20 V72 H76" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><rect x="40" y="52" width="26" height="14" rx="3" fill="#2DD4BF"/><rect x="40" y="34" width="26" height="14" rx="3" fill="#FFFFFF"/></svg></div>
    <div id="fav-16" class="fav"><svg viewBox="0 0 96 96" fill="none"><rect width="96" height="96" rx="20" fill="#4F2DD8"/><path d="M30 20 V72 H76" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><rect x="40" y="52" width="26" height="14" rx="3" fill="#2DD4BF"/><rect x="40" y="34" width="26" height="14" rx="3" fill="#FFFFFF"/></svg></div>
  </div>
</body>
</html>
